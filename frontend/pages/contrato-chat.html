<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Workly - Chat do Contrato</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link rel="stylesheet" href="../assets/css/comum.css">
        <link rel="stylesheet" href="../assets/css/workly-modulos.css?v=chat-page-v1">
        <link rel="stylesheet" href="../assets/css/theme-global.css">
    </head>
    <body>
        <header></header>

        <main class="module-page chat-page">
            <div class="module-container">
                <section class="module-hero chat-hero">
                    <div>
                        <span class="module-kicker">
                            <i class="fas fa-comments"></i>
                            Conversa do contrato
                        </span>
                        <h1>Chat do contrato</h1>
                        <p>Combine detalhes, envie atualizações e mantenha o histórico do serviço em um só lugar.</p>
                    </div>
                    <a href="contratos.html" class="module-btn secondary">
                        <i class="fas fa-arrow-left"></i>
                        Voltar para contratos
                    </a>
                </section>

                <section class="chat-page-layout">
                    <aside class="chat-contract-summary" id="chatContractSummary">
                        <div class="module-card skeleton-card">
                            <div class="module-card-body">
                                <h3>Carregando contrato...</h3>
                                <p>Buscando informações do serviço.</p>
                            </div>
                        </div>
                    </aside>

                    <section class="chat-room-card">
                        <header class="chat-room-header">
                            <div>
                                <span id="chatStatusLabel" class="module-pill">Contrato</span>
                                <h2 id="chatRoomTitle">Mensagens</h2>
                                <p id="chatRoomSubtitle">Carregando conversa...</p>
                            </div>
                        </header>

                        <div id="chatMessages" class="chat-room-messages">
                            <div class="workly-chat-empty">
                                <i class="fas fa-spinner fa-spin"></i>
                                <strong>Carregando mensagens...</strong>
                            </div>
                        </div>

                        <form id="chatForm" class="chat-room-form">
                            <textarea id="chatText" maxlength="2000" placeholder="Escreva sua mensagem..." required></textarea>
                            <button type="submit" class="module-btn primary">
                                <i class="fas fa-paper-plane"></i>
                                Enviar
                            </button>
                        </form>
                    </section>
                </section>
            </div>
        </main>

        <footer></footer>

        <script src="../assets/js/config.js"></script>
        <script src="../assets/js/comum.js"></script>
        <script src="../assets/js/contrato-chat.js?v=chat-page-v1"></script>
    </body>
</html>
