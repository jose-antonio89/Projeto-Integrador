<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Workly - Mensagens</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link rel="stylesheet" href="../assets/css/comum.css">
        <link rel="stylesheet" href="../assets/css/workly-modulos.css?v=messages-hub-v1">
        <link rel="stylesheet" href="../assets/css/theme-global.css">
    </head>
    <body>
        <header></header>

        <main class="messages-page">
            <section class="messages-shell">
                <aside class="messages-sidebar">
                    <div class="messages-sidebar-head">
                        <span class="module-kicker"><i class="fas fa-comments"></i> Central</span>
                        <h1>Mensagens</h1>
                        <p>Converse dentro dos contratos ativos.</p>

                        <div class="messages-search">
                            <i class="fas fa-search"></i>
                            <input id="conversationSearch" type="search" placeholder="Buscar conversa...">
                        </div>
                    </div>

                    <div id="conversationList" class="conversation-list">
                        <div class="conversation-loading">Carregando conversas...</div>
                    </div>
                </aside>

                <section class="message-panel" id="messagePanel">
                    <div class="message-empty-state">
                        <i class="fas fa-message"></i>
                        <h2>Selecione uma conversa</h2>
                        <p>Escolha um contrato ativo ao lado para visualizar e enviar mensagens.</p>
                    </div>
                </section>
            </section>
        </main>

        <div id="contractDetailsModal" class="contract-detail-modal" aria-hidden="true">
            <div class="contract-detail-backdrop" data-detail-close></div>
            <section class="contract-detail-card" role="dialog" aria-modal="true" aria-labelledby="contractDetailTitle">
                <header class="contract-detail-header">
                    <div>
                        <span class="module-kicker"><i class="fas fa-file-contract"></i> Detalhes</span>
                        <h2 id="contractDetailTitle">Contrato</h2>
                    </div>
                    <button type="button" class="contract-detail-close" data-detail-close aria-label="Fechar detalhes">
                        <i class="fas fa-xmark"></i>
                    </button>
                </header>
                <div id="contractDetailContent" class="contract-detail-content"></div>
            </section>
        </div>

        <footer></footer>

        <script src="../assets/js/config.js"></script>
        <script src="../assets/js/comum.js"></script>
        <script src="../assets/js/mensagens.js?v=messages-hub-v1"></script>
    </body>
</html>
