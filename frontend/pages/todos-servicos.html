<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workly - Todos os Serviços</title>
    <link rel="stylesheet" href="../assets/css/inicio.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../assets/css/todos-servicos.css">
<link rel="stylesheet" href="../assets/css/comum.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/theme-global.css">
</head>
  <body>  
     <header>
      </header>  

<section class="services-page-hero">
    <h1 id="category-title"></h1>
    <p>Refine sua busca por categoria, preço, avaliação e ordenação.</p>
    <form class="services-filter-bar" id="servicesFilterForm">
        <div class="filter-field filter-search-field">
            <i class="fas fa-search"></i>
            <input type="search" id="filterSearch" placeholder="Buscar serviço...">
        </div>

        <div class="filter-field filter-category-field">
            <i class="fas fa-layer-group"></i>
            <select id="filterCategory" aria-label="Categoria">
                <option value="">Todas as categorias</option>
                <option value="1">Design</option>
                <option value="2">Programação</option>
                <option value="3">Vídeo/Edição</option>
                <option value="4">Inteligência Artificial</option>
                <option value="5">Tradução/Escritor</option>
                <option value="6">Fotografia</option>
                <option value="7">Áudio/Música</option>
            </select>
        </div>

        <div class="filter-field filter-min-field">
            <i class="fas fa-dollar-sign"></i>
            <input type="number" id="filterMin" placeholder="Mínimo" min="0" step="0.01">
        </div>

        <div class="filter-field filter-max-field">
            <i class="fas fa-dollar-sign"></i>
            <input type="number" id="filterMax" placeholder="Máximo" min="0" step="0.01">
        </div>

        <div class="filter-field filter-rating-field">
            <i class="fas fa-star"></i>
            <select id="filterRating" aria-label="Avaliação mínima">
                <option value="">Qualquer avaliação</option>
                <option value="4.5">4,5+</option>
                <option value="4">4,0+</option>
                <option value="3">3,0+</option>
            </select>
        </div>

        <div class="filter-field filter-sort-field">
            <i class="fas fa-arrow-down-wide-short"></i>
            <select id="filterSort" aria-label="Ordenação">
                <option value="recentes">Mais recentes</option>
                <option value="preco_asc">Menor preço</option>
                <option value="preco_desc">Maior preço</option>
                <option value="avaliacao">Melhor avaliação</option>
            </select>
        </div>

        <div class="filter-actions">
            <button type="submit" class="filter-submit"><i class="fas fa-filter"></i> Filtrar</button>
            <a class="filter-clear" href="todos-servicos.html">Limpar</a>
        </div>
    </form>
</section>

<div class="servicos-container">
</div>
    <script src="../assets/js/config.js"></script>

<script src="../assets/js/comum.js"></script>
<script src="../assets/js/todos-servicos.js"></script>
</body>
</html>
