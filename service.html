<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serviço - Detalhes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/service.css">
</head>
<body>
    <header></header>

    <main class="service-page-container">
        <div class="service-image-column">
            <img src="" alt="Imagem do serviço" class="service-main-image">
        </div>
        <div class="service-details-column">
            <div class="service-details-content">
                <div class="service-category-badge"></div>
                <h1 class="service-title"></h1>
                <div class="freelancer-info-inline">
                    <img src="" alt="Foto do freelancer" class="freelancer-avatar-small">
                    <span class="freelancer-name"></span>
                </div>
                <p class="service-description"></p>
                <div id="edit-button-container"></div>
            </div>
            <div class="service-action-box">
                <div class="action-box-price">
                    <span>Preço do serviço</span>
                    <h2 class="service-price"></h2>
                </div>
                <button class="btn btn-primary btn-purchase"><i class="fas fa-shopping-cart"></i> Comprar</button>
                <button class="btn btn-secondary btn-contact"><i class="fas fa-envelope"></i> Contatar</button>
                <button class="btn-tertiary btn-favorite"><i class="fas fa-heart"></i> Favoritar</button>
            </div>
        </div>
    </main>

    <script src="js/service.js"></script>
</body>
</html>
